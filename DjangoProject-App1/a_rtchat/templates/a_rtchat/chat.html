{% extends 'layouts/blank.html' %}

{% block content %} 

<div class="block max-w-2xl mx-auto my-10 px-6">
    <div id="chat_window" class="h-[45rem] flex flex-col bg-gray-100 rounded-2xl shadow-lg relative">
        <!-- Chat Header -->
        <div class="flex items-center justify-between text-gray-800 bg-blue-600 text-white p-4 rounded-t-2xl">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-gray-200 rounded-full flex-shrink-0">
                    <!-- Placeholder for Avatar -->
                </div>
                <div>
                    <h3 class="text-lg font-bold">Public Chat</h3>
                    <p class="text-sm" id="online-count"><span class="pr-1">3</span>online</p>
                </div>
            </div>
        </div>

        <!-- Chat Messages -->
        <div id='chat_container' class="overflow-y-auto grow bg-gray-100 p-4">
            <ul id='chat_messages' class="flex flex-col gap-4">
                {% for message in chat_messages reversed %}
                <li class="{% if message.sent_by_user %}self-end bg-blue-500 text-white{% else %}self-start bg-gray-300 text-gray-800{% endif %} max-w-xs p-3 rounded-lg shadow">
                    {% include 'a_rtchat/chat_message.html' %}
                </li>
                {% endfor %}
            </ul>
        </div>

        <!-- Chat Input -->
        <div class="sticky bottom-0 z-10 bg-white p-4 rounded-b-2xl shadow">
            <form id="chat_message_form" class="flex items-center gap-2"
                hx-ext="ws"
                ws-connect="/ws/chatroom/public-chat"
                ws-send
                _="on htmx:wsAfterSend reset () me"
            >
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-lg shadow hover:bg-blue-700">
                    Send
                </button>
            </form>
        </div>
    </div>
</div>

{% endblock %}

{% block javascript %}
<script>
    function scrollToBottom(){
        const container = document.getElementById('chat_container');
        container.scrollTop = container.scrollHeight;
    }
    scrollToBottom();

    // Automatically scroll to the bottom when new messages are added
    const chatContainer = document.getElementById('chat_container');
    const observer = new MutationObserver(scrollToBottom);
    observer.observe(chatContainer, { childList: true });
</script>
{% endblock %}
